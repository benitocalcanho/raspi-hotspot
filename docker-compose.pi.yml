# ============================================================
#  docker-compose.pi.yml — Raspberry Pi GPIO overlay
#
#  Apply on top of either docker-compose.yml or docker-compose.prod.yml:
#
#  Dev build:
#    docker compose -f docker-compose.yml -f docker-compose.pi.yml up --build
#
#  Production (pull from registry, no build):
#    docker compose -f docker-compose.prod.yml -f docker-compose.pi.yml up -d
#
#  This overlay:
#    - Sets ENABLE_GPIO=true to activate the relay routes
#    - Maps /dev/gpiomem into the container for hardware access
# ============================================================

services:
  app:
    environment:
      # Enable the GPIO API routes and hardware relay output
      ENABLE_GPIO: "true"
      # Use real gpiozero hardware driver (overrides mock in prod compose)
      GPIO_MODE: gpiozero

    devices:
      # Pass the GPIO memory device so gpiozero can drive relay pins
      - /dev/gpiomem:/dev/gpiomem
      # lgpio uses the kernel GPIO character device API
      - /dev/gpiochip0:/dev/gpiochip0

    volumes:
      # Mount the host D-Bus socket so the container's nmcli talks to the
      # host's NetworkManager daemon — this enables WiFi management from
      # the admin dashboard without SSH
      - /var/run/dbus:/var/run/dbus

# ============================================================
#  docker-compose.prod.yml — Production deployment
#
#  Pulls the pre-built image from GitHub Container Registry.
#  No Docker build tools, Node.js, or config files needed.
#
#  Install with one command:
#    docker compose -f docker-compose.prod.yml up -d
#
#  Raspberry Pi (with GPIO):
#    docker compose -f docker-compose.prod.yml -f docker-compose.pi.yml up -d
#
#  Default login: admin / admin12345
#  All secrets (ngrok, SMTP, iCal) are configured in the Admin Dashboard.
# ============================================================

services:
  app:
    # Pre-built multi-arch image from GitHub Container Registry.
    # Supports: linux/amd64 (desktop), linux/arm64 (Pi 4/5), linux/arm/v7 (Pi 2/3)
    image: ghcr.io/benitocalcanho/invisible-key:latest

    env_file:
      - path: .env
        required: false

    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-invisible-key-default-secret-key-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-invisible-key-default-jwt-key-change-me}
      DATABASE_URL: sqlite:///data/invisible_key.db
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
      CALENDAR_GUEST_DEFAULT_PASSWORD: ${CALENDAR_GUEST_DEFAULT_PASSWORD:-guest12345}
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
      NGROK_STATIC_DOMAIN: ${NGROK_STATIC_DOMAIN:-}
      APP_PORT: 5000
      APP_HOST: 0.0.0.0
      GPIO_MODE: mock
      ENABLE_GPIO: "false"
      CALENDAR_SYNC_ENABLED: "true"
      CALENDAR_SYNC_INTERVAL: "300"
      CHECKOUT_TIME: "12:00"
      CHECKIN_TIME: "14:00"
      APP_TIMEZONE: ${APP_TIMEZONE:-}
      TZ: ${TZ:-}
      TAILSCALE_SUBNET: 100.64.0.0/10
      ADMIN_REQUIRE_TAILSCALE: "false"
      AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-180}
      DOOR_LOG_RETENTION_DAYS: ${DOOR_LOG_RETENTION_DAYS:-90}

    ports:
      - "5000:5000"

    volumes:
      # SQLite database — persists across container restarts and image updates
      # Flask-SQLAlchemy 3.x resolves sqlite:///data/invisible_key.db relative to instance_path
      - invisible_key_data:/app/backend/instance/data

      # Door images uploaded via the admin dashboard
      - invisible_key_uploads:/app/backend/uploads

      # Inherit host timezone files so runtime detection matches deployment target
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

    restart: unless-stopped
    container_name: invisible-key
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  invisible_key_data:
  invisible_key_uploads:

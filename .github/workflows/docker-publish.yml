# ============================================================
#  .github/workflows/docker-publish.yml
#
#  Builds and pushes a multi-architecture Docker image to
#  GitHub Container Registry (ghcr.io) on every push to main.
#
#  Supported platforms:
#    linux/amd64    — desktop / x86 servers / CI
#    linux/arm64    — Raspberry Pi 4, Pi 5 (64-bit OS)
#    linux/arm/v7   — Raspberry Pi 2, Pi 3 (32-bit OS)
#
#  After this workflow runs, anyone can deploy with:
#    docker compose -f docker-compose.prod.yml up -d
# ============================================================

name: Build & Publish Docker Image

on:
  push:
    branches:
      - main          # publish on every merge to main
    tags:
      - "v*"          # also publish on version tags (v1.0, v1.2.3, etc.)

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

env:
  # ghcr.io image name — automatically uses the repo owner/name
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/raspi-hotspot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      # Required to push to ghcr.io using the built-in GITHUB_TOKEN
      contents: read
      packages: write

    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Set up QEMU for cross-compilation ─────────────────
      # QEMU emulates arm64 and armv7 on the x86 GitHub runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64,linux/arm/v7

      # ── Set up Docker Buildx ───────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Log in to GitHub Container Registry ───────────────
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Compute image tags ─────────────────────────────────
      # Produces tags like:
      #   ghcr.io/benitocalcanho/raspi-hotspot:latest        (main branch)
      #   ghcr.io/benitocalcanho/raspi-hotspot:v1.2.3        (version tag)
      #   ghcr.io/benitocalcanho/raspi-hotspot:sha-a1b2c3d   (commit SHA)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      # ── Build and push ─────────────────────────────────────
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # Build for all three target architectures in parallel
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in the GitHub Actions cache for faster rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ============================================================
#  Invisible Key — Docker Compose
#
#  Desktop (no GPIO):
#    docker compose up --build
#
#  Raspberry Pi (with GPIO):
#    docker compose -f docker-compose.yml -f docker-compose.pi.yml up --build
#
#  Optional: provide config/.env to override defaults.
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set to "true" only on Raspberry Pi (installs gpiozero)
        ENABLE_GPIO: "false"

    # Optional local overrides. The app still starts without this file.
    env_file:
      - path: ./config/.env
        required: false

    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-invisible-key-default-secret-key-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-invisible-key-default-jwt-key-change-me}
      DATABASE_URL: sqlite:///data/invisible_key.db
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
      CALENDAR_GUEST_DEFAULT_PASSWORD: ${CALENDAR_GUEST_DEFAULT_PASSWORD:-guest12345}
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
      NGROK_STATIC_DOMAIN: ${NGROK_STATIC_DOMAIN:-}
      APP_PORT: 5000
      APP_HOST: 0.0.0.0
      GPIO_MODE: mock
      ENABLE_GPIO: "false"
      CALENDAR_SYNC_ENABLED: "true"
      CALENDAR_SYNC_INTERVAL: "300"
      CHECKOUT_TIME: "12:00"
      CHECKIN_TIME: "14:00"
      APP_TIMEZONE: ${APP_TIMEZONE:-}
      TZ: ${TZ:-}
      TAILSCALE_SUBNET: 100.64.0.0/10
      ADMIN_REQUIRE_TAILSCALE: "false"
      AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-180}
      DOOR_LOG_RETENTION_DAYS: ${DOOR_LOG_RETENTION_DAYS:-90}

    ports:
      # Host port : Container port
      - "5000:5000"

    volumes:
      # SQLite database — persists across container restarts and rebuilds
      - invisible_key_data:/app/backend/instance/data

      # Door images uploaded via the admin dashboard
      - invisible_key_uploads:/app/backend/uploads

      # Inherit host timezone files so runtime detection matches deployment target
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

    restart: unless-stopped

    # Optional: expose container logs with a clear name
    container_name: invisible-key
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

# ── Named volumes ─────────────────────────────────────────────────────────────
# Docker manages these on the host. To inspect:
#   docker volume inspect invisible-key_invisible_key_data
# To back up the database:
#   docker cp invisible-key:/app/backend/instance/data/invisible_key.db ./backup.db
volumes:
  invisible_key_data:
  invisible_key_uploads:
